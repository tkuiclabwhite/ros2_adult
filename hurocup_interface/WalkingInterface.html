	<script type="text/javascript" src="./js/roslib/eventemitter2.min.js"></script>
	<script type="text/javascript" src="./js/roslib/roslib.min.js"></script>
	<script type="text/javascript">
		var wasOnline = true;
		var ros = new ROSLIB.Ros({
		url: "ws://172.17.121.10:9090"
		});

		function checkConnection() {
			if (ros && window.navigator.onLine) {
				document.body.style.backgroundImage = 'url(./picture/Background.jpg)';
				console.log('Setting background to online image');
				if(!wasOnline){
					console.log("Network status changed to online. Triggering enterAddress().");
					enterAddress();
					wasOnline = true;
				}

			}else{
				document.body.style.backgroundImage = 'url(./picture/red_filter_image.jpg)';
				console.log('Setting background to offline image');
				if(wasOnline){
					console.log("Network status changed to offline. Triggering enterAddress().");
					enterAddress();
					wasOnline = false;
				}
				wasOnline = false;
			}	
		}
		

		// Listen to online and offline events
		window.addEventListener('online', checkConnection);
		window.addEventListener('offline', checkConnection);

		ros.on('connection', function () {
			console.log('Connection made!');
			connectFlag = true;
			createTopics();
			document.getElementById('connected').style.display = 'inline';

			checkConnectionInterval = setInterval(checkConnection, 1000);
		});
		ros.on('error', function (error) {
			console.log('Error connecting to websocket server: ', error);
			clearInterval(checkConnectionInterval);
			document.getElementById('connected').style.display = 'none';

			document.body.style.backgroundImage = 'url(./picture/red_filter_image.jpg)';
		});
		ros.on('close', function () {
			console.log('Connection to websocket server closed.');
			clearInterval(checkConnectionInterval);
			document.getElementById('connected').style.display = 'none';

			document.body.style.backgroundImage = 'url(./picture/red_filter_image.jpg)';
		});

		var SendBodyAuto_Topic = new ROSLIB.Topic({
			ros: ros,
			name: '/SendBodyAuto_Topic',
			messageType: 'tku_msgs/Interface'
		});
		var ChangeContinuousValue_Topic = new ROSLIB.Topic({
			ros: ros,
			name: '/ChangeContinuousValue_Topic',
			messageType: 'tku_msgs/Interface'
		});
		var Walkinggait_topic = new ROSLIB.Message({
			x: 0,
			y: 0,
			z: 0,
			theta: 0,
			walking_mode: 0,
			walking_state: 0,
			sensor_mode: 0
		});

		var ContinousMode_Topic = new ROSLIB.Topic({
			ros: ros,
			name: '/ContinousMode_Topic',
			messageType: 'std_msgs/Int16'
		});
		var ContinousMode_msg = new ROSLIB.Message({
			data: 0
		});
		var Send_parameter = new ROSLIB.Topic({
			ros: ros,
			name: '/Send_parameter',
			messageType: 'std_msgs/Bool'
		});
		var Send_parameter_msg = new ROSLIB.Message({
			data: false
		});
		var walkingParamsUpdateTopic = new ROSLIB.Topic({
			ros: ros,
			name: '/walking_params_update',
			messageType: 'std_msgs/String'
		});
		var Continuousback_Topic = new ROSLIB.Topic({
			ros: ros,
			name: '/walkinggait/Continuousback',
			messageType: 'std_msgs/Bool'
		});
		var Continuousback_msg = new ROSLIB.Message({
			data: false
		});

		var web_parameter_Topic = new ROSLIB.Topic({
			ros: ros,
			name: '/web/parameter_Topic',
			messageType: 'tku_msgs/Parameter'
		});

		var parameter_msg = new ROSLIB.Message({
			com_y_swing		: 0.0,
			width_size		: 4.5,
			period_t		: 360,
			t_dsp			: 0,
			lift_height		: 2.5,
			stand_height	: 50,
			com_height		: 40,
			hip_roll   		: 0,
			ankle_roll 		: 0,
		});

		var SensorSet_Publisher = new ROSLIB.Topic({
			ros: ros,
			name: '/sensorset',
			messageType: 'tku_msgs/SensorSet'
		});
		var SensorSet_msg = new ROSLIB.Message({
			reset: false,
		});

		var LoadWalkingGaitParameterClient = new ROSLIB.Service({
			ros: ros,
			name: '/web/LoadWalkingGaitParameter',
			serviceType: 'tku_msgs/WalkingGaitParameter'
		});
		var WalkingGaitParameter_request = new ROSLIB.ServiceRequest({
			mode: 0
		});

		//-----
		var SensorPackage_Subscriber = null;

		var connectFlag = false;
		var myAddress = "172.17.121.10";
		
		var Thetavaluetmp = 0;
		var Xvaluetmp = 0;
		var Yvaluetmp = 0;
		var statetype = 0;
		var ContinousModetmp = 0;

		/* Kick Ball Variables End */
		document.onkeydown = getKeyboard;

		function getKeyboard(e) {
			switch(window.event.keyCode)
			{
				case 87:	//W, Forward
					ForwardFun();
					break;
				case 83:	//S, Backward
					BackwardFun();
					break;
				case 65:	//A, Left Move
					LeftFun();
					break;
				case 68:	//D, Right Move
					RightFun();
					break;
				case 81:	//Q, Left Turn
					LeftTurnFun();
					break;
				case 69:	//E, Right Turn
					RightTurnFun();
					break;
			}
		}

		function createTopics() {
			if(SensorPackage_Subscriber != null)
			{
				SensorPackage_Subscriber.unsubscribe();
			}
			var SensorPackage_Subscriber = new ROSLIB.Topic({
			ros: ros,
			name: '/package/sensorpackage',
			messageType: 'tku_msgs/SensorPackage'
			});
			SensorPackage_Subscriber.subscribe(function (msg)
			{		
				document.getElementById("Roll").value  = parseInt(msg.roll);
				document.getElementById("Pitch").value = parseInt(msg.pitch);
				document.getElementById("Yaw").value   = parseInt(msg.yaw);
			});

		}

		function enterAddress() {
			if(connectFlag)
			{
				ros.close();
				connectFlag = false;
			}
			myAddress = document.getElementById("addressSelect").value;
			console.log("Connecting address is", myAddress);
			
			// WebSocket 連線 (9090)
			ros.connect("ws://"+myAddress+":9090");
		}

		var location_strategy = new ROSLIB.Topic({
			ros: ros,
			name: '/location',
			messageType: 'tku_msgs/location'
		});

		var location_msg = new ROSLIB.Message({
			data: ""

		});

		function strategylocation() {
			// 获取选定的值
			location_msg.data = "/home/iclab/ros2_adult/src/strategy/strategy/"+ document.getElementById('strategy_location').value + "/Parameter";
			console.log(`Selected strategy location: ${location_msg.data}`);
			location_strategy.publish(location_msg);
		}

		function LeftTurnFun() {
			Thetavaluetmp = Number(Thetavaluetmp) + 1;
			document.getElementById("Thetavalue").value = Thetavaluetmp;
			if (statetype == 0 ||statetype == 7 || statetype == 8) {
				ChangeContinuousValueFun();
			}
		}

		function ForwardFun() {
			Xvaluetmp = Number(Xvaluetmp) + 100;
			document.getElementById("Xvalue").value = Xvaluetmp;
			if (statetype == 0 ||statetype == 7 || statetype == 8) {
				ChangeContinuousValueFun();
			}
		}

		function RightTurnFun() {
			Thetavaluetmp = Number(Thetavaluetmp) - 1;
			document.getElementById("Thetavalue").value = Thetavaluetmp;
			if (statetype == 0 ||statetype == 7 || statetype == 8) {
				ChangeContinuousValueFun();
			}
		}

		function LeftFun() {
			Yvaluetmp = Number(Yvaluetmp) + 100;
			document.getElementById("Yvalue").value = Yvaluetmp;
			if (statetype == 0 ||statetype == 7 || statetype == 8) {
				ChangeContinuousValueFun();
			}
		}

		function RightFun() {
			Yvaluetmp = Number(Yvaluetmp) - 100;
			document.getElementById("Yvalue").value = Yvaluetmp;
			if (statetype == 0 ||statetype == 7 || statetype == 8) {
				ChangeContinuousValueFun();
			}
		}

		function BackwardFun() {
			Xvaluetmp = Number(Xvaluetmp) - 100;
			document.getElementById("Xvalue").value = Xvaluetmp;
			if (statetype == 0 ||statetype == 7 || statetype == 8) {
				ChangeContinuousValueFun();
			}
		}
		
		function Generate() {
			if (statetype == 0 && ContinousModetmp == 0) {
				ContinousMode_msg.data = 1;
				ContinousModetmp = 1;
				ContinousMode_Topic.publish(ContinousMode_msg);
			} 
			else if (statetype == 0 && ContinousModetmp == 1) 
			{
				ContinousMode_msg.data = 0;
				ContinousModetmp = 0;
				ContinousMode_Topic.publish(ContinousMode_msg);
			} 
			else if (statetype == 7 && ContinousModetmp == 0) 
			{
				ContinousMode_msg.data = 1;
				ContinousModetmp = 1;
				ContinousMode_Topic.publish(ContinousMode_msg);
			} 
			else if (statetype == 7 && ContinousModetmp == 1) 
			{
				ContinousMode_msg.data = 0;
				ContinousModetmp = 0;
				ContinousMode_Topic.publish(ContinousMode_msg);
			} 
			else if (statetype == 8 && ContinousModetmp == 0) 
			{
				ContinousMode_msg.data = 1;
				ContinousModetmp = 1;
				ContinousMode_Topic.publish(ContinousMode_msg);
			} 
			else if (statetype == 8 && ContinousModetmp == 1) 
			{
				ContinousMode_msg.data = 0;
				ContinousModetmp = 0;
				ContinousMode_Topic.publish(ContinousMode_msg);
			}
			SendBodyAutoFun();
		}

		function ChangeContinuousValueFun() {
			Walkinggait_topic.x = Number(Xvaluetmp);
			Walkinggait_topic.y = Number(Yvaluetmp);
			Walkinggait_topic.z = 0;
			Walkinggait_topic.theta = Number(Thetavaluetmp);
			Walkinggait_topic.walking_mode = Number(statetype);
			Walkinggait_topic.sensor_mode = Number(document.getElementById("IMU_Control").value);
			console.log(Walkinggait_topic.sensor_mode);
			ChangeContinuousValue_Topic.publish(Walkinggait_topic);
		}

		function SendBodyAutoFun() {
			Walkinggait_topic.x = Number(Xvaluetmp);
			Walkinggait_topic.y = Number(Yvaluetmp);
			Walkinggait_topic.z = 0;
			Walkinggait_topic.theta = Number(Thetavaluetmp);
			Walkinggait_topic.walking_mode = Number(statetype);
			Walkinggait_topic.sensor_mode = Number(document.getElementById("IMU_Control").value);
			console.log(Walkinggait_topic.sensor_mode);
			SendBodyAuto_Topic.publish(Walkinggait_topic);
		}

		function changeXvalue(value) {
			Xvaluetmp = value;
			document.getElementById("Xvalue").value = Xvaluetmp;
		}

		function changeYvalue(value) {
			Yvaluetmp = value;
			document.getElementById("Yvalue").value = Yvaluetmp;
		}

		function changethetavalue(value) {
			Thetavaluetmp = value;
			document.getElementById("Thetavalue").value = Thetavaluetmp;
		}

		function ContinuousFun() {
			statetype = 0;
			Load();
			document.getElementById("continuousstep").style.display = "inline";
		}

		function Load() {
			if (document.getElementById("Continuousback").checked) {
				Continuousback_msg.data = true;
				console.log("checked");
			}
			else {
				Continuousback_msg.data = false;
				console.log("unchecked");
			}
			Continuousback_Topic.publish(Continuousback_msg);
			console.log('statetype = ', statetype);
			WalkingGaitParameter_request.mode = Number(statetype);
			LoadWalkingGaitParameterClient.callService(WalkingGaitParameter_request, function (walkinggait_parameter) {
				com_y_swing_tmp 	= walkinggait_parameter.com_y_swing;
				width_size_tmp		= walkinggait_parameter.width_size;
				period_t_tmp 	  	= walkinggait_parameter.period_t;
				T_DSP_tmp			= walkinggait_parameter.t_dsp;
				lift_height_tmp 	= walkinggait_parameter.lift_height;
				stand_height_tmp 	= walkinggait_parameter.stand_height;
				com_height_tmp 		= walkinggait_parameter.com_height;
				hip_roll_tmp 		= walkinggait_parameter.hip_roll;
				ankle_roll_tmp 		= walkinggait_parameter.ankle_roll;

				switch (statetype) {
					case 0:
						document.getElementById("com_y_swing").value 	= com_y_swing_tmp;
						document.getElementById("WidthSize").value 		= width_size_tmp;
						document.getElementById("period_t").value 		= period_t_tmp;
						document.getElementById("T_DSP").value 			= T_DSP_tmp;
						document.getElementById("lift_height").value 	= lift_height_tmp;
						document.getElementById("stand_height").value 	= stand_height_tmp;
						document.getElementById("com_height").value 	= com_height_tmp;
						document.getElementById("hip_roll").value 		= hip_roll_tmp;
						document.getElementById("ankle_roll").value 	= ankle_roll_tmp;
						break;
				}
			});
		}

		function Save() {
			var s_type = Number(statetype);
			function getVal(id, defaultVal) {
				var el = document.getElementById(id);
				// 如果元素存在且有值，就回傳數值；否則回傳預設值
				if (el && el.value !== "") {
					return Number(el.value);
				}
				return defaultVal;
			}

			function getChecked(id) {
				var el = document.getElementById(id);
				if (el) return el.checked;
				return false;
			}

			var map = {
				com_y_swing		: "com_y_swing",
				width			: "width_size",
				period			: "period_t",
				T_DSP			: "T_DSP",
				lift_height		: "lift_height",
				stand_height	: "stand_height",
				com_height		: "com_height",
				hip_roll		: "hip_roll",
				ankle_roll		: "ankle_roll",
			};

			// 根據模式覆寫 ID (Override)
			switch (s_type) {
				case 0: // Continuous
					map.com_y_swing 	= "com_y_swing";
					map.width 			= "WidthSize";
					map.period 			= "period_t";
					map.T_DSP 			= "T_DSP";
					map.lift_height 	= "lift_height";
					map.stand_height 	= "stand_height";
					map.com_height 		= "com_height";
					map.hip_roll 		= "hip_roll";
					map.ankle_roll 		= "ankle_roll";
					break;
			}

			// =========================================================
			// 3. 從網頁讀取數值 (不再依賴 _tmp 全域變數)
			// =========================================================
			// 建立訊息封包
			var msg_to_send = new ROSLIB.Message({
				mode: s_type,
				
				// 核心參數
				com_y_swing		: getVal(map.com_y_swing, 0),
				width_size		: getVal(map.width, 4.5),
				period_t		: getVal(map.period, 360),
				t_dsp			: getVal(map.T_DSP, 0),
				lift_height		: getVal(map.lift_height, 2.5),
				stand_height	: getVal(map.stand_height, 50),
				com_height		: getVal(map.com_height, 40),
				hip_roll		: getVal(map.hip_roll, 0),
				ankle_roll		: getVal(map.ankle_roll, 0),
			});

			console.log("Saving Parameter (From UI Input):", msg_to_send);
			web_parameter_Topic.publish(msg_to_send);
		}

		function SendParam2FPGA() {
			Send_parameter_msg.data = true;
			Send_parameter.publish(Send_parameter_msg);

			// 取得 HTML 上的數值
			const COM_Y_swing  	= Number(document.getElementById("com_y_swing").value || 0);
			const width_size   	= Number(document.getElementById("WidthSize").value || 0);
			const period_t     	= Number(document.getElementById("period_t").value || 0);
			const Tdsp         	= Number(document.getElementById("T_DSP").value || 0);
			const lift_height  	= Number(document.getElementById("lift_height").value || 0);
			const stand_height 	= Number(document.getElementById("stand_height").value || 0);
			const COM_HEIGHT   	= Number(document.getElementById("com_height").value || 0);
			const hip_roll   	= Number(document.getElementById("hip_roll").value || 0);
			const ankle_roll   	= Number(document.getElementById("ankle_roll").value || 0);

			const params = {
				"period_t":    period_t,
				"Tdsp":        Tdsp,
				"COM_HEIGHT":  COM_HEIGHT,
				"STAND_HEIGHT": stand_height, // ★ 修正：使用小寫的變數 stand_height
				"lift_height": lift_height,
				"width_size":  width_size,
				"com_y_swing": COM_Y_swing,
				"hip_roll": hip_roll,
				"ankle_roll": ankle_roll,
			};

		    const msg = new ROSLIB.Message({
		        data: JSON.stringify(params)
		    });

		    console.log("publish /walking_params_update:", params);
		    walkingParamsUpdateTopic.publish(msg);
		}
		
		// ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝
		// 網頁端參數
		function changecom_y_swing_value(value) {
			com_y_swing_tmp = value;
			switch (statetype) {
				case 0:
					document.getElementById("com_y_swing").value = com_y_swing_tmp;
					break;
			}
		}

		function changeWidthSize_value(value){
			width_size_tmp = Number(value) || 0;
			document.getElementById("WidthSize").value = width_size_tmp;
		}

		function changeperiod_t_value(value) {
			period_t_tmp = value;
			switch (statetype) {
				case 0:
					document.getElementById("period_t").value = period_t_tmp;
					break;
			}
		}
		
		function changeT_DSP_value(value){
			t_dsp_tmp = value;
			switch (statetype) {

					document.getElementById("T_DSP").value = t_dsp_tmp;

		function changelift_height_value(value) {
			lift_height_tmp = value;
			switch (statetype) {

					document.getElementById("lift_height").value = lift_height_tmp;

		function change_stand_height_value(value) {
			stand_height_tmp = value;

		// ＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝＝
		
		function changeContinuousback() 
		{
			if (document.getElementById("Continuousback").checked) {
				Continuousback_msg.data = true;
				console.log("checked");

			else {

			Continuousback_Topic.publish(Continuousback_msg);

		function SendSensorSet()
		{
			SensorSet_msg.reset = true;
			SensorSet_Publisher.publish(SensorSet_msg);
			if (SensorSet_msg.reset == true)
			{
				SensorSet_msg.reset = false;
			}
		}
	</script>
